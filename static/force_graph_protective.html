<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Protective Biomarkers - OrganAge™</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  :root {
    --bg-dark: #0A0A0A;
    --bg-card: #1A1A1A;
    --accent-green: #00C896;
    --accent-teal: #06D6D6;
    --accent-blue: #4A90E2;
    --accent-cyan: #00A8CC;
    --text-primary: #FFFFFF;
    --text-secondary: #B0B0B0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 200, 150, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 200, 150, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  /* Center glow */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0, 200, 150, 0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    padding: 2rem;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, transparent 100%);
  }

  .title-block h1 {
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: var(--text-primary);
  }

  .title-block h1 span {
    color: var(--accent-green);
  }

  .title-block p {
    font-size: 0.875rem;
    color: var(--text-secondary);
    letter-spacing: 0.5px;
  }

  .legend {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    background: rgba(0, 0, 0, 0.8);
    padding: 1.5rem;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.75rem;
    color: var(--text-secondary);
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .legend-line {
    width: 40px;
    height: 2px;
    border-radius: 1px;
    margin-right: 0.5rem;
  }

  #graph {
    position: fixed;
    inset: 0;
    z-index: 1;
  }

  .tooltip {
    position: fixed;
    background: rgba(0, 0, 0, 0.95);
    border: 1px solid var(--accent-green);
    border-radius: 8px;
    padding: 1rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 100;
    max-width: 300px;
    backdrop-filter: blur(10px);
  }

  .tooltip.visible {
    opacity: 1;
  }

  .tooltip-title {
    font-weight: 700;
    font-size: 1rem;
    color: var(--accent-green);
    margin-bottom: 0.5rem;
  }

  .tooltip-subtitle {
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin-bottom: 0.75rem;
  }

  .tooltip .systems {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem;
  }

  .tooltip .systems span {
    display: inline-block;
    background: rgba(0, 200, 150, 0.1);
    border: 1px solid rgba(0, 200, 150, 0.3);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 0.75rem;
    color: var(--text-primary);
  }

  .pulse-ring {
    fill: none;
    stroke-width: 2;
    opacity: 0;
    animation: pulse 3s ease-out infinite;
  }

  @keyframes pulse {
    0% { r: 0; opacity: 0.6; }
    100% { r: 50; opacity: 0; }
  }

  .footer {
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: var(--text-secondary);
    letter-spacing: 1px;
    z-index: 10;
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>🟢 Top <span>Protective</span> Biomarkers</h1>
    <p>Force Graph · Biomarker–System Connectivity</p>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#00C896; box-shadow:0 0 8px #00C896"></div>
      Biomarker (10 systems)
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#06D6D6; box-shadow:0 0 8px #06D6D6"></div>
      Biomarker (6-8 systems)
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#4A90E2; box-shadow:0 0 8px #4A90E2"></div>
      Biomarker (3 systems)
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#FF6B35; box-shadow:0 0 8px #FF6B35"></div>
      Organ System
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background: linear-gradient(90deg, #00C896, #FF6B35)"></div>
      Connection
    </div>
  </div>
</header>

<div class="tooltip" id="tooltip"></div>
<svg id="graph"></svg>
<div class="footer">Drag nodes · Hover to inspect · Scroll to zoom</div>

<script>
const data = {
  nodes: [
    // Top 5 Protective Biomarkers
    { id: "Creatinine", type: "biomarker", systems: 10, label: "Creatinine", full: "Creatinine", contribution: -67.13 },
    { id: "MCHC", type: "biomarker", systems: 3, label: "MCHC", full: "Mean Corpuscular Hb Concentration", contribution: -21.42 },
    { id: "ALT", type: "biomarker", systems: 8, label: "ALT", full: "ALT (SGPT)", contribution: -19.49 },
    { id: "MPV", type: "biomarker", systems: 6, label: "MPV", full: "Mean Platelet Volume", contribution: -15.67 },
    { id: "RBC", type: "biomarker", systems: 7, label: "RBC Count", full: "Red Blood Cell Count", contribution: -15.17 },

    // 9 Organ Systems
    { id: "Digestive", type: "system", label: "Digestive" },
    { id: "Musculoskeletal", type: "system", label: "Musculo-\nskeletal" },
    { id: "Mental", type: "system", label: "Mental" },
    { id: "Respiratory", type: "system", label: "Respiratory" },
    { id: "Circulatory", type: "system", label: "Circulatory" },
    { id: "Nervous", type: "system", label: "Nervous" },
    { id: "Genitourinary", type: "system", label: "Genito-\nurinary" },
    { id: "Infectious", type: "system", label: "Infectious" },
    { id: "Metabolic", type: "system", label: "Metabolic" },
  ],
  links: [
    // Creatinine (all 10 - showing 9 organ systems)
    { source: "Creatinine", target: "Digestive" },
    { source: "Creatinine", target: "Musculoskeletal" },
    { source: "Creatinine", target: "Mental" },
    { source: "Creatinine", target: "Respiratory" },
    { source: "Creatinine", target: "Circulatory" },
    { source: "Creatinine", target: "Nervous" },
    { source: "Creatinine", target: "Genitourinary" },
    { source: "Creatinine", target: "Infectious" },
    { source: "Creatinine", target: "Metabolic" },

    // MCHC (3 systems)
    { source: "MCHC", target: "Mental" },
    { source: "MCHC", target: "Nervous" },
    { source: "MCHC", target: "Genitourinary" },

    // ALT (8 systems)
    { source: "ALT", target: "Circulatory" },
    { source: "ALT", target: "Mental" },
    { source: "ALT", target: "Nervous" },
    { source: "ALT", target: "Respiratory" },
    { source: "ALT", target: "Digestive" },
    { source: "ALT", target: "Musculoskeletal" },
    { source: "ALT", target: "Genitourinary" },

    // MPV (6 systems)
    { source: "MPV", target: "Infectious" },
    { source: "MPV", target: "Mental" },
    { source: "MPV", target: "Nervous" },
    { source: "MPV", target: "Respiratory" },
    { source: "MPV", target: "Musculoskeletal" },

    // RBC (7 systems)
    { source: "RBC", target: "Metabolic" },
    { source: "RBC", target: "Circulatory" },
    { source: "RBC", target: "Mental" },
    { source: "RBC", target: "Nervous" },
    { source: "RBC", target: "Digestive" },
    { source: "RBC", target: "Genitourinary" },
  ]
};

// OrganAge protective color scheme (greens/blues)
const biomarkerColors = {
  Creatinine: "#00C896",    // Green (10 systems)
  MCHC: "#4A90E2",          // Blue (3 systems)
  ALT: "#06D6D6",           // Teal (8 systems)
  MPV: "#06D6D6",           // Teal (6 systems)
  RBC: "#06D6D6"            // Teal (7 systems)
};

const systemColor = "#FF6B35";  // Orange for systems

const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#graph")
  .attr("width", width)
  .attr("height", height)
  .call(d3.zoom()
    .scaleExtent([0.5, 3])
    .on("zoom", (event) => g.attr("transform", event.transform)));

const g = svg.append("g");

const simulation = d3.forceSimulation(data.nodes)
  .force("link", d3.forceLink(data.links).id(d => d.id).distance(180))
  .force("charge", d3.forceManyBody().strength(-500))
  .force("center", d3.forceCenter(width / 2, height / 2))
  .force("collision", d3.forceCollide().radius(70));

// Links
const link = g.append("g")
  .selectAll("line")
  .data(data.links)
  .join("line")
  .attr("stroke", d => {
    const sourceNode = data.nodes.find(n => n.id === d.source.id || n.id === d.source);
    return biomarkerColors[sourceNode.id];
  })
  .attr("stroke-width", 1.5)
  .attr("stroke-opacity", 0.4);

// Nodes
const node = g.append("g")
  .selectAll("g")
  .data(data.nodes)
  .join("g")
  .call(d3.drag()
    .on("start", dragstarted)
    .on("drag", dragged)
    .on("end", dragended));

// Pulse rings for biomarkers
node.filter(d => d.type === "biomarker")
  .append("circle")
  .attr("class", "pulse-ring")
  .attr("stroke", d => biomarkerColors[d.id]);

// Main circles
node.append("circle")
  .attr("r", d => d.type === "biomarker" ? 35 : 30)
  .attr("fill", d => d.type === "biomarker" ? biomarkerColors[d.id] : systemColor)
  .attr("stroke", d => d.type === "biomarker" ? biomarkerColors[d.id] : systemColor)
  .attr("stroke-width", 2)
  .attr("opacity", 0.8)
  .style("filter", d => `drop-shadow(0 0 ${d.type === "biomarker" ? 8 : 6}px ${d.type === "biomarker" ? biomarkerColors[d.id] : systemColor})`);

// Labels INSIDE circles
node.append("text")
  .text(d => d.label)
  .attr("text-anchor", "middle")
  .attr("dy", "0.35em")
  .attr("fill", "#FFFFFF")
  .attr("font-size", d => d.type === "biomarker" ? "10px" : "9px")
  .attr("font-weight", "700")
  .style("pointer-events", "none")
  .style("user-select", "none")
  .each(function(d) {
    const text = d3.select(this);
    const lines = d.label.split('\n');
    if (lines.length > 1) {
      text.text('');
      lines.forEach((line, i) => {
        text.append('tspan')
          .text(line)
          .attr('x', 0)
          .attr('dy', i === 0 ? '-0.3em' : '1em');
      });
    }
  });

// Tooltip
const tooltip = d3.select("#tooltip");

node.on("mouseover", function(event, d) {
  if (d.type === "biomarker") {
    const systems = data.links
      .filter(l => l.source.id === d.id || l.source === d.id)
      .map(l => typeof l.target === "object" ? l.target.id : l.target);
    
    tooltip.html(`
      <div class="tooltip-title">${d.full}</div>
      <div class="tooltip-subtitle">Appears in ${d.systems} systems</div>
      <div class="tooltip-subtitle">Total Contribution: ${d.contribution.toFixed(2)}</div>
      <div class="systems">
        ${systems.map(s => `<span>${s}</span>`).join('')}
      </div>
    `);
  } else {
    const biomarkers = data.links
      .filter(l => (typeof l.target === "object" ? l.target.id : l.target) === d.id)
      .map(l => typeof l.source === "object" ? l.source.full : data.nodes.find(n => n.id === l.source).full);
    
    tooltip.html(`
      <div class="tooltip-title">${d.label} System</div>
      <div class="tooltip-subtitle">Protected by ${biomarkers.length} biomarkers</div>
      <div class="systems">
        ${biomarkers.map(b => `<span>${b}</span>`).join('')}
      </div>
    `);
  }
  
  tooltip.classed("visible", true)
    .style("left", (event.pageX + 15) + "px")
    .style("top", (event.pageY - 15) + "px");
})
.on("mouseout", function() {
  tooltip.classed("visible", false);
});

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
}

function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
  d.fx = null;
  d.fy = null;
}
</script>

</body>
</html>
